<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">
<title>LaptopKereső – Hardverapró Szűrő</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0c0f14;--bg2:#13161d;--card:#181c24;--card-h:#1e232e;
  --border:#262c38;--text:#e4e8f0;--muted:#6e7a8f;
  --accent:#e8943a;--accent-h:#f0a94f;--accent-dim:rgba(232,148,58,.12);
  --green:#34d27b;--red:#ef5350;--blue:#5ba4f5;
  --radius:7px;--radius-lg:10px;--sidebar:280px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 60% at 15% 30%,rgba(232,148,58,.04),transparent),
  radial-gradient(ellipse 60% 50% at 85% 70%,rgba(91,164,245,.03),transparent);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

header{position:sticky;top:0;z-index:100;background:rgba(12,15,20,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 14px;gap:10px}
.logo{display:flex;align-items:center;gap:7px;font-weight:700;font-size:16px;white-space:nowrap;letter-spacing:-.3px}
.logo-box{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#d06e28);border-radius:6px;display:grid;place-items:center;color:#fff;font-size:13px;flex-shrink:0}
.logo span{color:var(--accent)}
.badge{display:flex;align-items:center;gap:4px;padding:2px 9px;border-radius:14px;font-size:10px;font-weight:600;letter-spacing:.3px;flex-shrink:0}
.badge.live{background:rgba(52,210,123,.12);color:var(--green)}
.badge.demo{background:var(--accent-dim);color:var(--accent)}
.badge.err{background:rgba(239,83,80,.12);color:var(--red)}
.badge .dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.badge.live .dot{animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-sp{flex:1}
.btn-refresh{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(232,148,58,.25);border-radius:var(--radius);font:600 11px/1 'Space Grotesk',sans-serif;cursor:pointer;transition:.2s;white-space:nowrap;flex-shrink:0}
.btn-refresh:hover{background:rgba(232,148,58,.22);border-color:var(--accent)}
.btn-refresh.loading i{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.app{display:flex;min-height:calc(100vh - 56px);min-height:calc(100dvh - 56px);position:relative;z-index:1}

aside{width:var(--sidebar);min-width:var(--sidebar);border-right:1px solid var(--border);background:rgba(19,22,29,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);overflow-y:auto;height:calc(100vh - 56px);height:calc(100dvh - 56px);position:sticky;top:56px;padding:6px 0;-webkit-overflow-scrolling:touch}
.fs{border-bottom:1px solid var(--border)}
.fh{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none;transition:.15s;-webkit-user-select:none}
.fh:hover{background:rgba(255,255,255,.02)}
.fh h3{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
.fh h3 i{color:var(--accent);font-size:9px}
.fh .chev{font-size:9px;color:var(--muted);transition:transform .25s}
.fs.off .chev{transform:rotate(-90deg)}
.fs.off .fb{display:none}
.fb{padding:0 14px 10px}
.fo{display:flex;align-items:center;gap:7px;padding:5px 0;cursor:pointer;font-size:12.5px;color:var(--text);-webkit-user-select:none}
.fo input[type=checkbox]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid var(--border);border-radius:3px;cursor:pointer;position:relative;flex-shrink:0;transition:.15s}
.fo input:checked{background:var(--accent);border-color:var(--accent)}
.fo input:checked::after{content:'✓';position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800}
.fo .cnt{margin-left:auto;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.pi{display:flex;gap:5px;align-items:center}
.pi input{flex:1;padding:7px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font:12px/1 'JetBrains Mono',monospace;outline:none;transition:.2s;min-width:0}
.pi input:focus{border-color:var(--accent)}
.pi input::placeholder{color:var(--muted);opacity:.4}
.pi span{color:var(--muted);font-size:10px;flex-shrink:0}
.mi{width:100%;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font:12.5px/1.4 'Space Grotesk',sans-serif;outline:none;transition:.2s}
.mi:focus{border-color:var(--accent)}
.mi::placeholder{color:var(--muted);opacity:.4}
.btn-reset{display:flex;align-items:center;justify-content:center;gap:5px;width:calc(100% - 28px);margin:10px 14px;padding:8px;background:0 0;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);font:600 11px/1 'Space Grotesk',sans-serif;cursor:pointer;transition:.2s}
.btn-reset:hover{border-color:var(--red);color:var(--red);background:rgba(239,83,80,.08)}

main{flex:1;padding:16px 18px;min-width:0}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.rc{font-size:12.5px;color:var(--muted)}.rc b{color:var(--text);font-weight:700}
.rc .updated{font-size:10px;color:var(--muted);opacity:.7;margin-left:4px}
.tb-sp{flex:1}
.sel{padding:5px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font:12px/1 'Space Grotesk',sans-serif;cursor:pointer;outline:none}
.sel option{background:var(--card)}
.vt{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.vt button{padding:5px 9px;background:0 0;border:none;color:var(--muted);cursor:pointer;transition:.15s;font-size:12px}
.vt button.on{background:var(--accent-dim);color:var(--accent)}
.vt button:not(:last-child){border-right:1px solid var(--border)}

.list{display:flex;flex-direction:column;gap:8px}
.list.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.card{display:flex;gap:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);transition:.22s;cursor:default;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0;transition:.25s}
.card:hover{border-color:rgba(232,148,58,.28);background:var(--card-h);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.card:hover::after{opacity:1}
.card-img{width:110px;height:82px;min-width:110px;background:var(--bg);border-radius:var(--radius);display:grid;place-items:center;overflow:hidden;border:1px solid var(--border)}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .ph{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:24px}
.card-img .ph small{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);opacity:.5}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.card-title{font-size:13px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.badges{display:flex;flex-wrap:wrap;gap:4px}
.bdg{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);white-space:nowrap;line-height:1.6}
.bdg.hi{background:var(--accent-dim);border-color:rgba(232,148,58,.22);color:var(--accent)}
.bdg.gr{background:rgba(52,210,123,.08);border-color:rgba(52,210,123,.18);color:var(--green)}
.bdg.bl{background:rgba(91,164,245,.08);border-color:rgba(91,164,245,.18);color:var(--blue)}
.bdg.pk{background:rgba(233,30,99,.08);border-color:rgba(233,30,99,.18);color:#e91e63}
.card-seller{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.card-seller .name{font-weight:600;color:var(--text);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seller-ratings{display:flex;align-items:center;gap:4px;font-size:10px;font-family:'JetBrains Mono',monospace}
.seller-ratings .pos{color:var(--green)}
.seller-ratings .neg{color:var(--red)}
.seller-ratings .sep{color:var(--border)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;min-width:100px;gap:6px}
.card-price{font-size:16px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.card-price .cur{font-size:11px;font-weight:500;opacity:.8}
.btn-original{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(91,164,245,.1);border:1px solid rgba(91,164,245,.22);border-radius:4px;color:var(--blue);font:600 10px/1 'Space Grotesk',sans-serif;cursor:pointer;text-decoration:none;transition:.2s;white-space:nowrap}
.btn-original:hover{background:rgba(91,164,245,.2);border-color:var(--blue);transform:translateX(2px)}
.btn-original i{font-size:9px}
.list.grid .card{flex-direction:column}
.list.grid .card-img{width:100%;height:140px;min-width:unset}
.list.grid .card-right{flex-direction:row;justify-content:space-between;width:100%;align-items:center}

.btn-load-more{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:420px;margin:18px auto 8px;padding:13px 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);color:var(--text);font:600 13px/1 'Space Grotesk',sans-serif;cursor:pointer;transition:.25s}
.btn-load-more:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.btn-load-more:active{transform:scale(.97)}
.btn-load-more i{font-size:12px}
.btn-load-more .remaining{color:var(--muted);font-size:11px;font-weight:400;margin-left:4px}

.page-info{text-align:center;padding:4px 0 16px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

.err-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:16px;max-width:520px;margin:40px auto}
.err-panel .err-icon{width:72px;height:72px;border-radius:50%;background:rgba(239,83,80,.1);border:2px solid rgba(239,83,80,.2);display:grid;place-items:center;font-size:28px;color:var(--red)}
.err-panel h3{font-size:18px;font-weight:700;color:var(--text)}
.err-panel p{font-size:13px;color:var(--muted);line-height:1.6}
.err-panel .err-reason{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;font-size:11.5px;color:var(--muted);text-align:left;line-height:1.7;max-width:440px}
.err-panel .err-reason code{background:var(--bg);padding:2px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:10.5px;display:inline-block;word-break:break-all}
.err-panel .err-reason strong.step{color:var(--accent);display:block;margin-top:8px;margin-bottom:2px;font-size:12px}
.err-panel .err-reason strong.step:first-child{margin-top:0}
.btn-demo{display:flex;align-items:center;gap:7px;padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font:600 13px/1 'Space Grotesk',sans-serif;cursor:pointer;transition:.2s;margin-top:4px}
.btn-demo:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-demo:active{transform:scale(.97)}
.empty{text-align:center;padding:50px 20px}
.empty i{font-size:38px;color:var(--border);margin-bottom:12px;display:block}
.empty h3{font-size:15px;margin-bottom:5px;color:var(--text)}
.empty p{font-size:12.5px;color:var(--muted)}
.loading{text-align:center;padding:50px 20px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}

.toast{position:fixed;bottom:16px;left:16px;right:16px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;box-shadow:0 8px 28px rgba(0,0,0,.45);z-index:1000;transform:translateY(80px);opacity:0;transition:.3s;display:flex;align-items:center;gap:7px;max-width:400px;margin:0 auto}
.toast.show{transform:translateY(0);opacity:1}
.toast.t-err{border-color:rgba(239,83,80,.4)}
.toast.t-ok{border-color:rgba(52,210,123,.4)}
.toast.t-info{border-color:rgba(91,164,245,.4)}

.sb-tog{display:none;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;cursor:pointer;align-items:center;gap:5px;flex-shrink:0;font-family:'Space Grotesk',sans-serif;font-weight:600}
.sb-tog .filter-count{background:var(--accent);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:2px}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:98}
.sb-ov.show{display:block}
.sb-close{display:none;position:absolute;top:10px;right:12px;width:28px;height:28px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer;place-items:center;z-index:2}
aside.open .sb-close{display:grid}

#scrollTopBtn{position:fixed;bottom:20px;right:20px;width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:grid;place-items:center;font-size:17px;box-shadow:0 4px 18px rgba(232,148,58,.35);z-index:200;transition:.25s}
#scrollTopBtn:hover{background:var(--accent-h);transform:translateY(-3px);box-shadow:0 8px 24px rgba(232,148,58,.45)}
#scrollTopBtn:active{transform:scale(.9)}

.card{animation:cardIn .3s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:1024px){
  aside{position:fixed;left:-100%;top:56px;z-index:99;background:var(--bg2);transition:left .3s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.5);width:min(300px,85vw);min-width:unset}
  aside.open{left:0}
  .sb-tog{display:flex}
  .list.grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  header{height:50px;padding:0 10px;gap:7px}
  .logo{font-size:14px;gap:5px}
  .logo-box{width:26px;height:26px;font-size:11px;border-radius:5px}
  .badge{font-size:9px;padding:2px 7px}
  .btn-refresh{padding:5px 8px;font-size:10px}
  .btn-refresh span{display:none}
  main{padding:10px 8px}
  .toolbar{gap:6px;margin-bottom:10px}
  .rc{font-size:11px}
  .sel{font-size:11px;padding:4px 6px}
  .vt button{padding:4px 7px;font-size:11px}
  .list{gap:6px}
  .list.grid{grid-template-columns:1fr}
  .card{flex-direction:column;gap:8px;padding:10px}
  .card-img{width:100%;height:120px;min-width:unset}
  .card-right{flex-direction:row;justify-content:space-between;width:100%;align-items:center;min-width:unset}
  .card-title{font-size:12.5px;-webkit-line-clamp:2}
  .card-price{font-size:14px}
  .badges{gap:3px}
  .bdg{font-size:9px;padding:1px 5px;line-height:1.5}
  .card-seller .name{max-width:100px;font-size:10px}
  .seller-ratings{font-size:9px}
  .btn-original{font-size:9px;padding:3px 8px}
  aside{width:min(280px,82vw);top:50px;height:calc(100vh - 50px);height:calc(100dvh - 50px)}
  .err-panel{padding:30px 16px;margin:20px auto}
  .err-panel .err-icon{width:56px;height:56px;font-size:22px}
  .err-panel h3{font-size:16px}
  .err-panel p{font-size:12px}
  .err-panel .err-reason{font-size:10.5px;padding:10px 12px}
  .btn-demo{padding:9px 18px;font-size:12px}
  .toast{left:12px;right:12px;bottom:12px;font-size:11px}
  #scrollTopBtn{width:40px;height:40px;font-size:15px;bottom:16px;right:14px}
  .btn-load-more{padding:11px 18px;font-size:12px}
}
@media(max-width:370px){
  .logo span{display:none}
  .card-price{font-size:13px}
  .bdg{font-size:8.5px;padding:1px 4px}
  .card-seller .name{max-width:80px}
}
@supports(padding:env(safe-area-inset-bottom)){
  #scrollTopBtn{bottom:calc(20px + env(safe-area-inset-bottom))}
  .toast{bottom:calc(16px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<header>
  <button class="sb-tog" id="sbTog" onclick="togSB()"><i class="fas fa-sliders-h"></i>Szűrők<span class="filter-count" id="fCount" style="display:none">0</span></button>
  <div class="logo"><div class="logo-box"><i class="fas fa-laptop"></i></div>Laptop<span>Kereső</span></div>
  <div id="badge" class="badge demo"><span class="dot"></span><span id="badgeTxt">Betöltés...</span></div>
  <div class="hdr-sp"></div>
  <button class="btn-refresh" id="refBtn" onclick="doFetch()"><i class="fas fa-sync-alt"></i><span>Frissítés</span></button>
</header>

<div class="sb-ov" id="sbOv" onclick="togSB()"></div>

<div class="app">
  <aside id="sb">
    <button class="sb-close" onclick="togSB()"><i class="fas fa-times"></i></button>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-tag"></i>Ár</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb"><div class="pi"><input type="number" id="pMin" placeholder="Min" inputmode="numeric" oninput="apply()"><span>–</span><input type="number" id="pMax" placeholder="Max" inputmode="numeric" oninput="apply()"><span>Ft</span></div></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-building"></i>Márka</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fBrand"></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-microchip"></i>CPU széria</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fCpuSeries"></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-microchip"></i>CPU gyártó</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fCPU"></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-tv"></i>GPU gyártó</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fGPU"></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-tv"></i>GPU modell</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fGPUModel"></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-tachometer-alt"></i>Képkfrissítés</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fRefresh"></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-desktop"></i>Kijelző méret</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fScreen"></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-expand"></i>Felbontás</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fRes"></div></div>
    <div class="fs"><div class="fh" onclick="togF(this)"><h3><i class="fas fa-memory"></i>RAM típus</h3><i class="fas fa-chevron-down chev"></i></div><div class="fb" id="fRamT"></div></div>

function gpuBadgeClass(gpuMfr, gpuModel){
  if(!gpuMfr) return '';
  const m = gpuMfr.toLowerCase();
  if(m==='nvidia') return 'bl';
  if(m==='amd') return 'pk';
  return ''; /* Intel / Apple → alap stílus */
}

function getCpuSeries(cpuModel, cpuMfr){
  if(!cpuModel) return '';
  const m = cpuModel.toUpperCase();
  if(cpuMfr==='Apple'){
    if(m.includes('M4')) return 'Apple M4';
    if(m.includes('M3')) return 'Apple M3';
    if(m.includes('M2')) return 'Apple M2';
    if(m.includes('M1')) return 'Apple M1';
    return 'Apple egyéb';
  }
  if(m.includes('ULTRA')) return 'Intel Core Ultra';
  if(cpuMfr==='Intel'){
    const numMatch=m.match(/(\d{4,})/);
    if(numMatch){
      const firstTwo=parseInt(numMatch[1].substring(0,2));
      if(firstTwo>=14) return 'Intel 14th Gen';
      if(firstTwo===13) return 'Intel 13th Gen';
      if(firstTwo===12) return 'Intel 12th Gen';
      if(firstTwo===11) return 'Intel 11th Gen';
      if(firstTwo===10) return 'Intel 10th Gen';
      if(firstTwo===9)  return 'Intel 9th Gen';
      if(firstTwo===8)  return 'Intel 8th Gen';
      if(firstTwo===7)  return 'Intel 7th Gen';
      return 'Intel régebbi';
    }
    return 'Intel egyéb';
  }
  if(cpuMfr==='AMD'){
    const numMatch=m.match(/(\d{4,})/);
    if(numMatch){
      const d=numMatch[1][0];
      if(d==='9') return 'AMD Ryzen 9000';

      if(d==='3') return 'AMD Ryzen 3000';
      return 'AMD egyéb';
    }
    return 'AMD egyéb';
  }
  return '';
}

async function fetchJSON(){
  const r = await fetch(DATA_URL, {signal: AbortSignal.timeout(15000)});
  if(!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  if(!Array.isArray(data)) throw new Error('Nem JSON tomb');
  return data;
}

async function doFetch(){
  const btn = document.getElementById('refBtn');
  btn.classList.add('loading');
  document.getElementById('listC').innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Adatok betöltése a GitHubról...</p></div>';
  setStatus('live','Betöltés...');
  try{
    const data = await fetchJSON();
    all = data.map(item => ({
      title: item.title || '',
      desc: item.desc || item.description || '',
      link: item.link || item.url || '',
      image: item.image || item.img || '',
      price: item.price || null,
      seller: {
        name: (item.seller && item.seller.name) || item.seller_name || 'Ismeretlen',
        pos: (item.seller && item.seller.pos) || item.seller_pos || 0,
        neg: (item.seller && item.seller.neg) || item.seller_neg || 0,
      },
      brand: item.brand || '',
      screenSize: item.screenSize || item.screen_size || null,
      resolution: item.resolution || item.res || '',
      ramType: item.ramType || item.ram_type || '',
      ramSize: item.ramSize || item.ram_size || null,
      ssdSize: item.ssdSize || item.ssd_size || null,
      cpuMfr: item.cpuMfr || item.cpu_mfr || '',
      cpuModel: item.cpuModel || item.cpu_model || '',
      gpuMfr: item.gpuMfr || item.gpu_mfr || '',
      gpuModel: item.gpuModel || item.gpu_model || '',
      model: item.model || '',
      refreshRate: item.refreshRate || item.refresh_rate || null,
    })).filter(it => it.title);
    all.forEach(it => { it.cpuSeries = getCpuSeries(it.cpuModel, it.cpuMfr); });
    lastUpdate = new Date();
    displayCount = PAGE_SIZE;
    setStatus('live', all.length + ' hirdetés');
    toast(all.length + ' hirdetés betöltve','ok');
    buildFilters();
    apply();
  }catch(e){
    btn.classList.remove('loading');
    showErrPanel(e.message);
  }
  btn.classList.remove('loading');
}

        <strong class="step">4. lépés — Írd át az URL-t ebben a HTML fájlban</strong>
        <code>const DATA_URL = '...';</code> sort cseréld ki a valós linkre.
      </div>` : `
      <div class="err-reason">
        Ellenőrizd hogy:<br>
        - A repo <strong>publikus</strong>-e<br>
        - A fájl létezik-e a repo-ban<br>
        - Az URL pontos-e<br><br>
        <code>${DATA_URL}</code>
      </div>`}
      <button class="btn-demo" onclick="loadDemoMode()"><i class="fas fa-play"></i>Demo mód betöltése (${DEMO.length} minta)</button>
    </div>
  `;
}

function loadDemoMode(){
  setStatus('demo','Demo mód');
  loadDemo();
  toast('Demo mód – ' + DEMO.length + ' minta hirdetés','info');
}
function loadDemo(){
  all = JSON.parse(JSON.stringify(DEMO));
  all.forEach(it => { it.cpuSeries = getCpuSeries(it.cpuModel, it.cpuMfr); });
  lastUpdate = null;
  displayCount = PAGE_SIZE;
  buildFilters();
  apply();
}

function counts(arr, key){
  const m={};
  arr.forEach(x=>{ const v=x[key]; if(v) m[v]=(m[v]||0)+1; });
  return m;
}
function renderChecks(containerId, key, order){
  const c = counts(all, key);
  const el = document.getElementById(containerId);
  const entries = Object.entries(c).sort((a,b)=>{
    if(order){ const ia=order.indexOf(a[0]),ib=order.indexOf(b[0]); if(ia!==-1&&ib!==-1) return ia-ib; if(ia!==-1) return -1; if(ib!==-1) return 1; }
    return -a[1]+b[1];
  });
  el.innerHTML = entries.map(([v,n])=>`
    <label class="fo"><input type="checkbox" value="${v}" onchange="apply()"> ${v} <span class="cnt">${n}</span></label>
  `).join('');
}
function renderRefreshChecks(containerId, key, order){
  const c = counts(all, key);
  const el = document.getElementById(containerId);
  const entries = order.filter(v => c[v]).map(v => [v, c[v]]);
  el.innerHTML = entries.map(([v,n])=>`
    <label class="fo"><input type="checkbox" value="${v}" onchange="apply()"> ${v}Hz <span class="cnt">${n}</span></label>
  `).join('');
}
function buildFilters(){
  renderChecks('fCpuSeries','cpuSeries',CPU_SERIES_ORDER);
  renderChecks('fBrand','brand',['Lenovo','Dell','HP','ASUS','Acer','MSI','Apple','Huawei','Xiaomi','Microsoft','Razer','Toshiba','LG','Fujitsu','Medion','Samsung']);
  renderChecks('fScreen','screenSize',[13.3,13.4,13.6,14,15.6,16,17.3]);
  renderChecks('fRes','resolution',['4K / QHD+','QHD','FHD','HD+','HD']);
  renderChecks('fRamT','ramType',['DDR3','DDR4','DDR5','LPDDR4','LPDDR5','LPDDR5X']);
  renderChecks('fRamS','ramSize',[4,8,16,32,64]);
  renderChecks('fSSD','ssdSize',[128,256,512,1024,2048]);
  renderChecks('fCPU','cpuMfr',['Intel','AMD','Apple']);
  renderChecks('fGPU','gpuMfr',['NVIDIA','AMD','Intel','Apple']);
  renderChecks('fGPUModel','gpuModel');
  renderRefreshChecks('fRefresh','refreshRate',REFRESH_ORDER);
}

function getChecked(id){
  return [...document.querySelectorAll('#'+id+' input:checked')].map(c=>c.value);
}
function countActiveFilters(){
  let c = 0;
  if(document.getElementById('pMin').value) c++;
  if(document.getElementById('pMax').value) c++;
  ['fBrand','fScreen','fRes','fRamT','fRamS','fSSD','fCPU','fGPU','fGPUModel','fCpuSeries','fRefresh'].forEach(id=>{
    c += document.querySelectorAll('#'+id+' input:checked').length;
  });
  if(document.getElementById('fModel').value.trim()) c++;
  return c;
}
function apply(){
  displayCount = PAGE_SIZE;
  const pMin = parseInt(document.getElementById('pMin').value)||0;
  const pMax = parseInt(document.getElementById('pMax').value)||Infinity;
  const brands = getChecked('fBrand');
  const cpuSeries = getChecked('fCpuSeries');
  const screens = getChecked('fScreen').map(Number);
  const ress = getChecked('fRes');
  const ramTs = getChecked('fRamT');
  const ramSs = getChecked('fRamS').map(Number);
  const ssds = getChecked('fSSD').map(Number);
  const cpus = getChecked('fCPU');
  const gpus = getChecked('fGPU');
  const gpuModels = getChecked('fGPUModel');
  const refreshRates = getChecked('fRefresh').map(Number);
  const modelQ = document.getElementById('fModel').value.trim().toLowerCase();

  filtered = all.filter(it=>{
    if(it.price!==null&&it.price!==undefined){ if(it.price<pMin||it.price>pMax) return false; }
    if(brands.length&&!brands.includes(it.brand)) return false;
    if(cpuSeries.length&&!cpuSeries.includes(it.cpuSeries)) return false;
    if(screens.length&&!screens.includes(it.screenSize)) return false;
    if(ress.length&&!ress.includes(it.resolution)) return false;
    if(ramTs.length&&!ramTs.includes(it.ramType)) return false;
    if(ramSs.length&&!ramSs.includes(it.ramSize)) return false;
    if(ssds.length&&!ssds.includes(it.ssdSize)) return false;
    if(cpus.length&&!cpus.includes(it.cpuMfr)) return false;
    if(gpus.length&&!gpus.includes(it.gpuMfr)) return false;
    if(gpuModels.length&&!gpuModels.includes(it.gpuModel)) return false;
    if(refreshRates.length&&it.refreshRate&&!refreshRates.includes(it.refreshRate)) return false;
    if(refreshRates.length&&!it.refreshRate) return false;
    if(modelQ){
      const h = ((it.model||'')+' '+it.title+' '+it.desc+' '+it.cpuModel+' '+it.gpuModel).toLowerCase();
      if(!h.includes(modelQ)) return false;
    }
    return true;
  });

  const sort = document.getElementById('sortSel').value;
  filtered.sort((a,b)=>{
    if(sort==='pa') return ((a.price||Infinity)-(b.price||Infinity));
    if(sort==='pd') return ((b.price||0)-(a.price||0));
    return a.title.localeCompare(b.title,'hu');
  });

  activeFilterCount = countActiveFilters();
  const fc = document.getElementById('fCount');
  fc.textContent = activeFilterCount;
  fc.style.display = activeFilterCount ? 'inline' : 'none';

  render();
}

function loadMore(){
  displayCount += PAGE_SIZE;
  render();
  const btn = document.querySelector('.btn-load-more');
  if(btn) btn.scrollIntoView({behavior:'smooth', block:'center'});
}

function fmtPrice(p){
  if(!p&&p!==0) return 'Nincs ár';
  return p.toLocaleString('hu-HU')+' <span class="cur">Ft</span>';
}
function fmtSSD(v){
  if(!v) return null;
  return v>=1024?(v/1024)+' TB':v+' GB';
}
function trustColor(pos, neg){
  if(!pos&&!neg) return 'var(--muted)';
  const ratio = neg > 0 ? pos/neg : pos;
  if(ratio >= 20) return 'var(--green)';
  if(ratio >= 5) return '#8bc34a';
  if(ratio >= 2) return 'var(--accent)';
  return 'var(--red)';
}
function fmtTime(d){
  if(!d) return '';
  const diff = Math.floor((Date.now() - d.getTime()) / 60000);
  if(diff < 1) return 'frissen';
  if(diff < 60) return diff + ' perce';
  if(diff < 1440) return Math.floor(diff/60) + ' órája';
  return Math.floor(diff/1440) + ' napja';
}

function render(){
  const c = document.getElementById('listC');
  const total = filtered.length;
  const shown = Math.min(displayCount, total);
  const updStr = lastUpdate ? '<span class="updated">(frissítve: '+fmtTime(lastUpdate)+')</span>' : '';
  document.getElementById('rc').innerHTML = '<b>'+total+'</b> hirdetés'+(total !== shown ? ' <span style="color:var(--muted);font-weight:400">(megjelenítve: '+shown+')</span>' : '')+' '+updStr;

  if(!filtered.length && all.length){
    c.innerHTML = '<div class="empty"><i class="fas fa-filter"></i><h3>Nincs találat</h3><p>Próbáld meg lazítani a szűrőket.</p></div>';
    return;
  }

  c.className = 'list'+(view==='grid'?' grid':'');
  const pageItems = filtered.slice(0, displayCount);

  let html = pageItems.map((it,i)=>{
    const bc = BC[it.brand]||'#444';
    const badges = [];

    /* CPU badge */
    if(it.cpuModel) badges.push('<span class="bdg hi"><i class="fas fa-microchip"></i>'+it.cpuModel+'</span>');

    /* GPU badge – mindig megjelenik, szín gyártó alapján */
    if(it.gpuModel){
      const gpuCls = gpuBadgeClass(it.gpuMfr, it.gpuModel);
      badges.push('<span class="bdg '+gpuCls+'"><i class="fas fa-tv"></i>'+it.gpuModel+'</span>');
    }

    if(it.ramSize) badges.push('<span class="bdg"><i class="fas fa-memory"></i>'+it.ramSize+'GB'+(it.ramType?' '+it.ramType:'')+'</span>');
    if(it.ssdSize) badges.push('<span class="bdg"><i class="fas fa-hdd"></i>'+fmtSSD(it.ssdSize)+' SSD</span>');
    if(it.refreshRate&&it.refreshRate>60) badges.push('<span class="bdg pk"><i class="fas fa-tachometer-alt"></i>'+it.refreshRate+'Hz</span>');
    if(it.screenSize) badges.push('<span class="bdg"><i class="fas fa-desktop"></i>'+it.screenSize+'"</span>');
    if(it.resolution) badges.push('<span class="bdg"><i class="fas fa-expand"></i>'+it.resolution+'</span>');
    if(it.brand) badges.push('<span class="bdg gr"><i class="fas fa-building"></i>'+it.brand+'</span>');

    const imgHtml = it.image
      ? '<img src="'+it.image+'" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=ph style=color:'+bc+'><i class=fas fa-laptop></i><small>'+(it.brand||'Laptop')+'</small></div>\'">'
      : '<div class="ph" style="color:'+bc+'"><i class="fas fa-laptop"></i><small>'+(it.brand||'Laptop')+'</small></div>';

    const sn = it.seller?it.seller.name:'';
    const sp = it.seller?it.seller.pos:0;
    const sn2 = it.seller?it.seller.neg:0;
    const tc = trustColor(sp,sn2);
    const sellerHtml = sn ? '<div class="card-seller"><i class="fas fa-user-circle" style="color:'+tc+';font-size:13px;flex-shrink:0"></i><span class="name" title="'+sn+'">'+sn+'</span>'+((sp||sn2)?'<span class="seller-ratings"><span class="pos">+'+sp+'</span><span class="sep">/</span><span class="neg">-'+sn2+'</span></span>':'')+'</div>' : '';

    const origBtn = it.link ? '<a class="btn-original" href="'+it.link+'" target="_blank" rel="noopener noreferrer"><i class="fas fa-external-link-alt"></i>Eredeti</a>' : '';

    return '<div class="card" style="animation-delay:'+Math.min(i*25,500)+'ms"><div class="card-img">'+imgHtml+'</div><div class="card-body"><div class="card-title">'+it.title+'</div><div class="badges">'+badges.join('')+'</div>'+sellerHtml+'</div><div class="card-right"><div class="card-price">'+fmtPrice(it.price)+'</div>'+origBtn+'</div></div>';
  }).join('');

  if(total > displayCount){
    const remaining = total - displayCount;
    const loadAmt = Math.min(PAGE_SIZE, remaining);
    html += '<button class="btn-load-more" onclick="loadMore()"><i class="fas fa-angle-double-down"></i>Több betöltése<span class="remaining">('+loadAmt+' db, összesen '+remaining+')</span></button>';
  }
  if(total > PAGE_SIZE){
    html += '<div class="page-info">'+shown+' / '+total+' hirdetés</div>';
  }

  c.innerHTML = html;
}

function togF(el){ el.parentElement.classList.toggle('off'); }
function togSB(){
  const sb=document.getElementById('sb'), ov=document.getElementById('sbOv');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
  document.body.style.overflow = sb.classList.contains('open') ? 'hidden' : '';
}
function setV(v,btn){
  view=v;
  document.querySelectorAll('.vt button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function resetF(){
  document.querySelectorAll('.fb input[type=checkbox]').forEach(c=>c.checked=false);
  document.getElementById('pMin').value='';
  document.getElementById('pMax').value='';
  document.getElementById('fModel').value='';
  apply();
}
function setStatus(type,txt){
  const b=document.getElementById('badge');
  b.className='badge '+(type==='live'?'live':type==='err'?'err':'demo');
  document.getElementById('badgeTxt').textContent=txt;
}
let toastTimer;
function toast(msg,type){
  const el=document.getElementById('toast');
  el.className='toast t-'+(type||'info')+' show';
  el.innerHTML='<i class="fas fa-'+(type==='err'?'exclamation-circle':type==='ok'?'check-circle':'info-circle')+'"></i>'+msg;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),4500);
}

doFetch();
</script>
</body>
</html>
