name: Hardverapró Scraper

on:
  schedule:
    # 8 óránként fut, de eltolva a kerek időpontról (37. percben)
    - cron: '37 */8 * * *'
  workflow_dispatch: # Kézi indítás is marad

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Függőségek
        run: pip install requests beautifulsoup4 cloudscraper

      - name: Scrapelés
        # Először várunk véletlenszerűen 0-5 percet, csak utána indul a python
        run: |
          sleep $((RANDOM % 300))
          python scraper.py

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add hirdetesek.json
          git diff --staged --quiet || git commit -m "Auto: hirdetések frissítve"
          git push
