name: Hardverapró Scraper

on:
  schedule:
    # Minden 6 órában fut (UTC szerint)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Kézi indítás is

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Függőségek
        run: pip install requests beautifulsoup4

      - name: Scrapelés
        run: python scraper.py

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add hirdetesek.json
          git diff --staged --quiet || git commit -m "Auto: hirdetések frissítve"
          git push
